services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=rec_engine_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    command: mlflow server --backend-store-uri postgresql://root:root@postgres:5432/mlflow_db --default-artifact-root ./mlruns --host 0.0.0.0
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - ./kafka/logs:/opt/kafka/logs

  airflow-webserver:
    build: .
    # image: apache/airflow:2.7.1
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://root:root@postgres:5432/airflow_db
      - AIRFLOW__CORE__FERNET_KEY=-urofmd_V45RqJZz2eyzoMD_xSbONUH6wF4OvJ4XO4Q=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/dags
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./core:/opt/airflow/dags/core
    command: standalone
    depends_on:
      - postgres